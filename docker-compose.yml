

services:
  web:
    build: .
    ports:
      - "6666:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=evo_password
      - DB_NAME=evo
      - LEAGUE_NAME=localhost:6666

  db:
    image: mysql:5.7
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=evo_password
      - MYSQL_DATABASE=evo
    volumes:
      # Chạy file khởi tạo DB khi mysql container start lần đầu
      - ./setup/dbinit.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

volumes:
  db_data:
